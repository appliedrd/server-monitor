# Copy this to servers.yaml and edit for your own targets:
#   cp servers.example.yaml servers.yaml
#
# Two check types:
#   type: http  -> needs `url`; optional `expect_status`:
#                    - a list/int of acceptable codes (default [200,301,302]), or
#                    - the string `any` = reachability check: any HTTP response
#                      under 500 counts as up. Use for third-party APIs/CDNs that
#                      answer 401/403/404/302 to bare requests but are still up.
#   type: tcp   -> needs `host` + `port`
# `name` is what shows up in the SMS / log.

servers:
  - name: Example website
    type: http
    url: https://example.com
    expect_status: [200, 301, 302]

  - name: Example API health endpoint
    type: http
    url: https://api.example.com/health
    expect_status: [200]

  - name: Example SSH
    type: tcp
    host: 203.0.113.10
    port: 22

  # - name: Example database
  #   type: tcp
  #   host: db.internal
  #   port: 5432
